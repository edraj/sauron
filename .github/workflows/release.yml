name: Release

on:
  push:
    branches: [main]
  # dry run: builds the RPMs as workflow artifacts, creates no release
  workflow_dispatch:

concurrency:
  # Serialize releases so two quick merges can't compute the same version.
  # A newer push replaces the queued run; the in-flight one finishes first,
  # so the queued run sees its tag and bumps the patch off it.
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Compute the next release version — the single source of truth for every
  # downstream job. major.minor come from backend/Cargo.toml; the patch is the
  # highest existing v<maj>.<min>.* tag + 1 (0 when none exists yet). Humans
  # bump major/minor in Cargo.toml when they want; the patch auto-advances.
  # ---------------------------------------------------------------------------
  version:
    name: compute version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full tag history for the patch scan

      - id: compute
        run: |
          set -euo pipefail
          mm=$(awk -F'"' '/^version *= *"/{split($2,a,"."); print a[1]"."a[2]; exit}' backend/Cargo.toml)
          [ -n "$mm" ] || { echo "::error::could not read major.minor from backend/Cargo.toml"; exit 1; }
          # v0.1.* matches v0.1.5 but not v0.11.0 (fnmatch '.' is literal); sort -V
          # orders patches numerically so v0.1.10 beats v0.1.9.
          latest=$(git tag -l "v${mm}.*" | sort -V | tail -n1)
          if [ -z "$latest" ]; then
            patch=0
          else
            patch=$(( ${latest##*.} + 1 ))
          fi
          version="${mm}.${patch}"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"         >> "$GITHUB_OUTPUT"
          echo "Next release: ${tag} (previous v${mm}.* tag: ${latest:-none})"

  # ---------------------------------------------------------------------------
  # Compile once per distro (native), with a shared sccache so the second distro
  # leg reuses the first's compilation cache. Uploads the binaries + dashboard
  # assets + the prebuilt libduckdb the binaries were linked against.
  #
  # Cargo.toml is left pristine here so the sccache / cargo-registry caches stay
  # warm across releases — the release version is stamped in at package time.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fedora
            image: fedora:44
          - target: el9
            image: almalinux:9
    container: ${{ matrix.image }}
    env:
      # sccache-backed compilation cache, shared across matrix legs and runs.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - name: Install build toolchain
        # Native code left after the build optimizations is just ring's C/asm, so
        # only a C compiler + perl are needed — no gcc-c++/cmake/clang (DuckDB is
        # prebuilt, TLS is the ring backend, zstd links the system library). zstd
        # needs pkgconfig(libzstd) → libzstd-devel (in CRB on EL9). lld = fast
        # linker; curl+unzip drive the libduckdb fetch.
        run: |
          . /etc/os-release
          dnf install -y \
            gcc perl-interpreter lld pkgconf-pkg-config \
            git tar gzip gawk findutils curl unzip
          case "$ID" in
            fedora)
              dnf install -y libzstd-devel ;;
            *)
              dnf install -y 'dnf-command(config-manager)' || :
              dnf config-manager --set-enabled crb 2>/dev/null \
                || dnf config-manager --set-enabled powertools 2>/dev/null || :
              dnf install -y libzstd-devel ;;
          esac

      - name: Install Rust (rustup — uniform across distros)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Node 22
        run: |
          . /etc/os-release
          case "$ID" in
            fedora) dnf install -y nodejs npm ;;
            *)      curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
                    dnf install -y nodejs ;;
          esac
          node --version && npm --version

      - uses: actions/checkout@v4

      - name: Trust the workspace (container git)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry (not target — sccache owns compiled objects)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-targets: "false"

      - name: Cache libduckdb download
        uses: actions/cache@v4
        with:
          path: .cache/duckdb
          key: libduckdb-${{ hashFiles('backend/Cargo.lock') }}

      - name: Fetch prebuilt libduckdb
        run: echo "DUCKDB_LIB_DIR=$(packaging/rpm/fetch-libduckdb.sh)" >> "$GITHUB_ENV"

      - name: Compile workspace + dashboard
        run: |
          # Fast linker for the many-binary final link — best-effort.
          if command -v ld.lld >/dev/null 2>&1; then
            export RUSTFLAGS="-C link-arg=-fuse-ld=lld"
          fi
          (cd dashboard && npm ci && npm run build) &
          dashboard_build=$!
          (cd backend && cargo build --release --workspace)
          wait "$dashboard_build"

      - name: sccache stats
        run: sccache --show-stats || true

      - name: Assemble prebuilt artifacts
        run: |
          mkdir -p prebuilt/bin prebuilt/dist
          for b in sauron-api sauron-ingest sauron-monitor sauron-tier sauron-migrate sauron-symcli crebain; do
            install -m0755 "backend/target/release/$b" "prebuilt/bin/$b"
          done
          cp -a dashboard/dist/. prebuilt/dist/
          install -m0755 "$DUCKDB_LIB_DIR/libduckdb.so" prebuilt/libduckdb.so

      - uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.target }}
          path: prebuilt
          if-no-files-found: error
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Package the precompiled artifacts. No toolchain here — just rpm-build, so it
  # runs in seconds. Native per distro (dist tag + auto-deps computed correctly).
  # The computed version is stamped into the spec + Cargo.toml (checkout only,
  # never committed) so the RPM carries v<maj>.<min>.<patch>-1.
  # ---------------------------------------------------------------------------
  package:
    name: package (${{ matrix.target }})
    needs: [version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fedora
            image: fedora:44
          - target: el9
            image: almalinux:9
    container: ${{ matrix.image }}
    steps:
      - name: Install rpm tooling (no compiler toolchain)
        run: dnf install -y rpm-build systemd-rpm-macros git tar gzip gawk findutils coreutils sed

      - uses: actions/checkout@v4

      - name: Trust the workspace (container git)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/download-artifact@v4
        with:
          name: prebuilt-${{ matrix.target }}
          path: prebuilt

      - name: Stamp computed version into spec + Cargo.toml
        env:
          V: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # First `version = "..."` line only — matches build-rpm.sh's reader.
          sed -i '0,/^version = ".*"/s//version = "'"$V"'"/' backend/Cargo.toml
          sed -i -E 's/^(Version:[[:space:]]*).*/\1'"$V"'/'    packaging/rpm/sauron.spec
          sed -i -E 's/^(Release:[[:space:]]*).*/\11%{?dist}/' packaging/rpm/sauron.spec
          echo ">> stamped:"
          grep -E '^version = ' backend/Cargo.toml | head -n1
          grep -E '^(Version|Release):' packaging/rpm/sauron.spec

      - name: Package prebuilt RPMs
        env:
          RPMBUILD_TOPDIR: ${{ github.workspace }}/rpmbuild
        run: ./packaging/rpm/build-rpm.sh --prebuilt "$PWD/prebuilt"

      - uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.target }}
          path: |
            rpmbuild/RPMS/**/*.rpm
            rpmbuild/SRPMS/*.rpm
          if-no-files-found: error

  release:
    name: publish GitHub release
    # Real merges to main publish; workflow_dispatch is a build-only dry run.
    if: github.event_name == 'push'
    needs: [version, package]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and attach RPMs
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t FILES < <(find dist -name '*.rpm' | sort)
          [ "${#FILES[@]}" -gt 0 ] || { echo "::error::no RPMs found to release"; exit 1; }
          printf 'asset: %s\n' "${FILES[@]}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            # Re-run against an existing release/tag: refresh the assets.
            gh release upload "$TAG" --repo "$REPO" --clobber "${FILES[@]}"
          else
            # Creates the v<version> tag at the merge commit, then the release.
            gh release create "$TAG" --repo "$REPO" --target "$SHA" \
              --title "Sauron $TAG" --generate-notes "${FILES[@]}"
          fi
