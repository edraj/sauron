server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime config must never be cached — ops changes the API URL without a rebuild.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
        try_files $uri =404;
    }

    # index.html should always be revalidated so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Fingerprinted build assets are safe to cache aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every unknown path renders the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic gzip.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
