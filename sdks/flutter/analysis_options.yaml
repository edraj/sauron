include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  exclude:
    # The example is a standalone app with its own pubspec; analyze it there.
    - example/**

linter:
  rules:
    # SDK reliability: never let a plugin/IO failure crash the host app.
    avoid_catches_without_on_clauses: false
    public_member_api_docs: false
    prefer_relative_imports: true
