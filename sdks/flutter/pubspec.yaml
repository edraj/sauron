name: sauron_flutter
description: >-
  Sauron SDK for Flutter — captures uncaught Flutter/Dart errors across all four
  layers, records breadcrumbs, exposes track()/identify(), and batches, gzips,
  persists and delivers envelopes to the Sauron ingest gateway.
version: 0.3.0
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  device_info_plus: ^12.0.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.1.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0

flutter:
